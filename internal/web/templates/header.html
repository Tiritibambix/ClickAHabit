{{ define "header.html"}}

<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ .Config.Color }}">
<head>
    <title>Click A Habit</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="/fs/public/favicon.png">
    {{ if eq .Config.NodePath "" }}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/gh/aceberg/aceberg-bootswatch-fork@v5/dist/{{ .Config.Theme }}/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix@2.0.1"></script>
    {{ else }}
    <link rel="stylesheet" href="{{ .Config.NodePath }}/node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link href="{{ .Config.NodePath }}/node_modules/bootswatch/dist/{{ .Config.Theme }}/bootstrap.min.css" rel="stylesheet">
    <script src="{{ .Config.NodePath }}/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ .Config.NodePath }}/node_modules/chart.js/dist/chart.umd.js"></script>
    <script src="{{ .Config.NodePath }}/node_modules/chartjs-chart-matrix/dist/chartjs-chart-matrix.min.js"></script>
    {{ end }}
</head>
<link rel="stylesheet" type="text/css" href="/fs/public/css/index.css" />
<body style="--btn-width: {{ .Config.BtnWidth }}">
  <nav class="navbar navbar-expand-sm navbar-dark bg-primary py-1">
    <div class="container-lg">
      <a class="navbar-brand py-0" href="/">
        <img src="/fs/public/favicon.png" style="width: 1.8em; vertical-align: middle;"/>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-0">
          <li class="nav-item">
            <a class="nav-link py-1" href="/planedit/new"><i class="bi bi-plus-circle me-1"></i>Add</a>
          </li>
          <li class="nav-item">
            <a class="nav-link py-1" href="/plan/"><i class="bi bi-list-check me-1"></i>Plan</a>
          </li>
          <li class="nav-item">
            <a class="nav-link py-1" href="/stats/checks/total"><i class="bi bi-bar-chart-line me-1"></i>Stats</a>
          </li>
          <li class="nav-item">
            <a class="nav-link py-1" href="/config/"><i class="bi bi-gear me-1"></i>Config</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
{{ end }}
