{{ define "index.html" }}
</head>
<script src="/fs/public/js/index.js"></script>
<body id="indexBody">
<div class="container-lg">
  <div class="date-bar my-3">
    <div class="d-flex align-items-center justify-content-between gap-2">
      <div class="form-switch ms-1">
        <input class="form-check-input" type="checkbox" onclick='toggleTabname()' title="Daily/Weekly">
      </div>
      <div class="d-flex align-items-center gap-2 flex-grow-1 justify-content-center">
        <button onclick='setFormDate(-1)' class="btn tr-button px-2"><i class="bi bi-chevron-left"></i></button>
        <input type="date" class="form-control form-control-sm text-center" onchange='setFormDate()' id="realDate" style="max-width:160px;">
        <button onclick='setFormDate(+1)' class="btn tr-button px-2"><i class="bi bi-chevron-right"></i></button>
        <button onclick='updatePlan()' class="btn tr-button px-2" title="Sync plan"><i class="bi bi-arrow-clockwise"></i></button>
      </div>
      <button onclick='toggleLayout()' class="btn tr-button me-1 d-none d-md-block" title="Toggle layout">
        <i class="bi bi-layout-wtf"></i>
      </button>
    </div>
  </div>
  <div class="row" id="checkList">
  </div>
</div>
<script>
  setToday();
</script>

{{ template "footer.html" }}
{{ end }}
