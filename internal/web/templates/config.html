{{ define "config.html" }}

<body>
    <div class="container-lg mt-4">
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card border-primary">
                <div class="card-header fw-semibold">Configuration</div>
                <div class="card-body">
                    <form action="/config/" method="post">
                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-4 col-form-label text-muted small">Host</label>
                            <div class="col-sm-8"><input name="host" type="text" class="form-control form-control-sm" value="{{ .Config.Host }}"></div>
                        </div>
                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-4 col-form-label text-muted small">Port</label>
                            <div class="col-sm-8"><input name="port" type="text" class="form-control form-control-sm" value="{{ .Config.Port }}"></div>
                        </div>
                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-4 col-form-label text-muted small">Theme</label>
                            <div class="col-sm-8">
                                <select name="theme" class="form-select form-select-sm">
                                    <option selected>{{ .Config.Theme }}</option>
                                    {{ range .Themes }}
                                        <option value="{{ . }}">{{ . }}</option>
                                    {{ end }}
                                </select>
                            </div>
                        </div>
                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-4 col-form-label text-muted small">Color mode</label>
                            <div class="col-sm-8">
                                <select name="color" class="form-select form-select-sm">
                                    <option selected>{{ .Config.Color }}</option>
                                    <option value="light">light</option>
                                    <option value="dark">dark</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-4 row align-items-center">
                            <label class="col-sm-4 col-form-label text-muted small">Button width</label>
                            <div class="col-sm-8"><input name="btnwidth" type="text" class="form-control form-control-sm" value="{{ .Config.BtnWidth }}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm px-4">Save</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-secondary">
                <div class="card-header fw-semibold">About</div>
                <div class="card-body small text-muted">
                    <p>After changing <strong>Host</strong> or <strong>Port</strong> the app must be restarted.</p>
                    <p><strong>Button Width</strong> can be set in <code>px</code> or <code>em</code>. Example: <code>180px</code></p>
                </div>
            </div>
        </div>
    </div>
    </div>

{{ template "footer.html" }}
{{ end }}
